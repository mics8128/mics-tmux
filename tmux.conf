# Core behavior
set -sg escape-time 10
set -g repeat-time 600
set -g history-limit 100000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on
set -g aggressive-resize on
set -g allow-rename off

# Terminal/color support
set -g default-terminal "tmux-256color"
set -g terminal-overrides "xterm-256color:RGB,xterm-ghostty:RGB"

# Window/pane defaults
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
setw -g mode-keys vi
bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind r refresh-client -S \; display-message "tmux client refreshed"
bind R source-file /Users/mics/projects/mics-tmux/tmux.conf \; display-message "tmux config reloaded"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind X confirm-before -p "kill-window #W? (y/n)" kill-window
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# Vim-style copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Status bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 90

set -g status-style 'fg=colour252,bg=colour235'
set -g status-left '#[fg=#{?client_prefix,colour16,colour245},bg=#{?client_prefix,colour229,colour236},#{?client_prefix,bold,none}] ^B #[default]'
set -g status-right '#[fg=colour244,bg=colour235] 󰓅 #(uptime | sed "s/.*load averages*: //" | cut -d" " -f1) #[fg=colour238] | #[fg=colour244] 󰁹 #(pmset -g batt | awk "NR==2 {gsub(/;/, \"\"); print \$3}") #[fg=colour238] | #[fg=colour229] 󰥔 %H:%M '

set -g window-status-format '#[fg=colour245,bg=colour235] #I:#W '
set -g window-status-current-format '#[fg=colour16,bg=colour81,bold] #I:#W '
set -g window-status-activity-style 'fg=colour229,bg=colour235,bold'
set -g window-status-bell-style 'fg=colour16,bg=colour203,bold'

set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'
set -g message-style 'fg=colour16,bg=colour229'
set -g mode-style 'fg=colour16,bg=colour81,bold'

# Initialize tpack (keep this line at the very bottom of tmux.conf)
run 'tpack init'
